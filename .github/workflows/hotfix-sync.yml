# .github/workflows/hotfix-sync.yml
name: Hotfix – Open PR to Dev

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  sync-to-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Open PR to Dev
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr create \
            --base dev \
            --head ${{ github.event.pull_request.head.ref }} \
            --title "Hotfix Sync: ${{ github.event.pull_request.title }}" \
            --body "Auto-generated sync PR from Hotfix: #${{ github.event.pull_request.number }}"