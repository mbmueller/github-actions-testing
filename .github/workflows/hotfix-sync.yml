# .github/workflows/hotfix-sync.yml
name: Hotfix – Open PR to Dev

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  set-user:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

  sync-to-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Restore Hotfix Branch if deleted
        run: |
          git checkout -b ${{ github.event.pull_request.head.ref }} \
            ${{ github.event.pull_request.head.sha }}
          git push origin ${{ github.event.pull_request.head.ref }}

      - name: Create Sync Branch
        run: |
          git fetch origin
          # Temporären Branch von Dev aus erstellen
          git checkout -b sync/hotfix-${{ github.event.pull_request.number }} origin/dev
          # Nur den Squash-Commit von Main cherry-picken
          git cherry-pick origin/main
          git push origin sync/hotfix-${{ github.event.pull_request.number }}

      - name: Open PR to Dev
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base dev \
            --head sync/hotfix-${{ github.event.pull_request.number }} \
            --title "Hotfix Sync: ${{ github.event.pull_request.title }}" \
            --body "Auto-generated sync PR from Hotfix #${{ github.event.pull_request.number }}, triggered by @${{ github.actor }}"